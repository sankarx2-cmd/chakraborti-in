<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Homepage Option 6 · Night Sky</title>
    <style>
      :root {
        --text: #f4f7ff;
        --muted: #cfd9f2;
        --line: rgba(168, 188, 232, 0.33);
        --accent: #ff5a63;
        --nav: #deebff;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        min-height: 100vh;
        color: var(--text);
        background-color: #050a1f;
        background-image:
          radial-gradient(circle at 18% 26%, rgba(102, 150, 255, 0.34) 0%, rgba(102, 150, 255, 0) 34%),
          radial-gradient(circle at 76% 84%, rgba(165, 88, 198, 0.34) 0%, rgba(165, 88, 198, 0) 30%),
          linear-gradient(180deg, #07102e 0%, #0b1232 36%, #10113a 100%);
        position: relative;
        overflow-x: hidden;
      }
      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: -1;
      }
      body::before {
        background-image:
          radial-gradient(1px 1px at 8% 14%, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0)),
          radial-gradient(1px 1px at 16% 64%, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0)),
          radial-gradient(1px 1px at 28% 35%, rgba(255, 255, 255, 0.64), rgba(255, 255, 255, 0)),
          radial-gradient(1px 1px at 34% 78%, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0)),
          radial-gradient(1px 1px at 49% 19%, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0)),
          radial-gradient(1px 1px at 57% 56%, rgba(255, 255, 255, 0.64), rgba(255, 255, 255, 0)),
          radial-gradient(1px 1px at 65% 30%, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0)),
          radial-gradient(1px 1px at 73% 74%, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0)),
          radial-gradient(1px 1px at 86% 38%, rgba(255, 255, 255, 0.68), rgba(255, 255, 255, 0)),
          radial-gradient(1px 1px at 93% 62%, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0));
        animation: twinkle 7s ease-in-out infinite alternate;
      }
      body::after {
        left: -12%;
        right: -12%;
        top: -22%;
        bottom: -22%;
        background:
          radial-gradient(ellipse at 50% 50%, rgba(154, 184, 255, 0.45) 0%, rgba(154, 184, 255, 0.16) 20%, rgba(154, 184, 255, 0) 58%),
          radial-gradient(ellipse at 50% 50%, rgba(206, 168, 255, 0.36) 0%, rgba(206, 168, 255, 0) 64%);
        transform: rotate(-18deg);
        filter: blur(1px);
        opacity: 0.5;
        animation: drift 26s ease-in-out infinite alternate;
      }
      .container {
        width: min(1420px, 92vw);
        margin: 0 auto;
      }
      .site-header {
        border-bottom: 1px solid var(--line);
        background: rgba(6, 13, 36, 0.42);
        backdrop-filter: blur(8px);
      }
      .header-row {
        min-height: 86px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }
      .brand {
        display: inline-flex;
        align-items: center;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(247, 251, 255, 0.92);
      }
      .brand-logo { height: 20px; width: auto; }
      .site-nav {
        display: flex;
        flex-wrap: wrap;
        column-gap: 8ch;
        row-gap: 10px;
      }
      .site-nav a {
        color: var(--nav);
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-size: 0.8rem;
        position: relative;
        padding: 4px 0;
      }
      .site-nav a::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: -6px;
        height: 2px;
        background: var(--accent);
        transform: scaleX(0.35);
        transform-origin: left center;
        opacity: 0;
        transition: transform 220ms ease, opacity 140ms ease;
      }
      .site-nav a:hover,
      .site-nav a.active { color: #ffffff; }
      .site-nav a:hover::after,
      .site-nav a.active::after { transform: scaleX(1); opacity: 1; }
      .home-main {
        min-height: calc(100vh - 165px);
        display: flex;
        align-items: center;
      }
      .hero {
        width: min(1420px, 92vw);
        margin: 0 auto;
        text-align: center;
        padding: 5vh 0 10vh;
      }
      .hero h1 {
        margin: 0;
        font-size: clamp(2rem, 4.5vw, 4.05rem);
        line-height: 1.18;
        letter-spacing: -0.02em;
        color: #f9fbff;
        text-shadow: 0 6px 22px rgba(2, 4, 13, 0.65);
        animation: rise 760ms ease both;
      }
      .hero p {
        margin: 62px auto 0;
        max-width: 39ch;
        font-size: clamp(1.2rem, 2.3vw, 2rem);
        line-height: 1.37;
        color: var(--muted);
        text-shadow: 0 3px 14px rgba(5, 8, 20, 0.65);
        animation: rise 980ms ease both;
      }
      .site-footer {
        border-top: 1px solid var(--line);
        background: rgba(4, 10, 31, 0.55);
        color: #d5dff8;
      }
      .site-footer .container {
        padding: 18px 0 20px;
        text-align: center;
        font-size: clamp(1.1rem, 1.6vw, 1.6rem);
      }
      @keyframes rise {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes twinkle {
        from { opacity: 0.58; }
        to { opacity: 0.88; }
      }
      @keyframes drift {
        from { transform: rotate(-18deg) translate3d(0, 0, 0); }
        to { transform: rotate(-18deg) translate3d(2.5%, -1.4%, 0); }
      }
      @media (max-width: 980px) {
        .header-row { padding: 14px 0 12px; }
        .site-nav { width: 100%; column-gap: 4ch; }
        .hero p { margin-top: 40px; }
      }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-row">
        <a class="brand" href="/"><img class="brand-logo" src="/chakraborti-logo.png" alt="Chakraborti" /></a>
        <nav class="site-nav" aria-label="Main navigation">
          <a href="/family/">About Us</a>
          <a href="/stories/" class="active">Our Stories</a>
          <a href="/memoirs/">Research &amp; Articles</a>
          <a href="/apps/">Apps &amp; Tools</a>
        </nav>
      </div>
    </header>

    <main class="home-main">
      <section class="hero">
        <h1>We are time travelling lump of stardust. Just like you!</h1>
        <p>Welcome to our family's home on cyberspace</p>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">&copy; Chakraborti Family, 2026 | We do not collect any data.</div>
    </footer>
  </body>
</html>
