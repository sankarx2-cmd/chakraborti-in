<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Homepage Option 4 · Sage Quartz</title>
    <style>
      :root {
        --bg-1: #f4f8f4;
        --bg-2: #eef4ee;
        --text: #15241d;
        --muted: #53655d;
        --line: #cfdad2;
        --accent: #be2222;
        --nav: #51645b;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        min-height: 100vh;
        color: var(--text);
        background: linear-gradient(155deg, var(--bg-1) 0%, var(--bg-2) 100%);
        position: relative;
        overflow-x: hidden;
      }
      .glow,
      .glow-2 {
        position: fixed;
        border-radius: 999px;
        pointer-events: none;
        z-index: -1;
      }
      .glow {
        width: 430px;
        height: 430px;
        left: -150px;
        top: -165px;
        background: radial-gradient(circle, rgba(80, 126, 95, 0.2) 0%, rgba(80, 126, 95, 0) 74%);
        animation: swayA 21s ease-in-out infinite alternate;
      }
      .glow-2 {
        width: 470px;
        height: 470px;
        right: -180px;
        bottom: -185px;
        background: radial-gradient(circle, rgba(190, 34, 34, 0.14) 0%, rgba(190, 34, 34, 0) 72%);
        animation: swayB 25s ease-in-out infinite alternate;
      }
      .container {
        width: min(1420px, 92vw);
        margin: 0 auto;
      }
      .site-header {
        border-bottom: 1px solid var(--line);
        background: rgba(247, 251, 247, 0.75);
        backdrop-filter: blur(7px);
      }
      .header-row {
        min-height: 86px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }
      .brand-logo { height: 20px; width: auto; }
      .site-nav {
        display: flex;
        flex-wrap: wrap;
        column-gap: 8ch;
        row-gap: 10px;
      }
      .site-nav a {
        color: var(--nav);
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-size: 0.8rem;
        position: relative;
        padding: 4px 0;
      }
      .site-nav a::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: -6px;
        height: 2px;
        background: var(--accent);
        transform: scaleX(0.35);
        transform-origin: left center;
        opacity: 0;
        transition: transform 220ms ease, opacity 140ms ease;
      }
      .site-nav a.active,
      .site-nav a:hover { color: #1f3229; }
      .site-nav a.active::after,
      .site-nav a:hover::after { transform: scaleX(1); opacity: 1; }
      .home-main {
        min-height: calc(100vh - 165px);
        display: flex;
        align-items: center;
      }
      .hero {
        width: min(1420px, 92vw);
        margin: 0 auto;
        text-align: center;
        padding: 5vh 0 10vh;
      }
      .hero h1 {
        margin: 0;
        font-size: clamp(2rem, 4.45vw, 4rem);
        line-height: 1.18;
        letter-spacing: -0.021em;
        color: var(--text);
        animation: up 740ms ease both;
      }
      .hero p {
        margin: 62px auto 0;
        max-width: 39ch;
        font-size: clamp(1.2rem, 2.25vw, 1.95rem);
        line-height: 1.37;
        color: var(--muted);
        animation: up 980ms ease both;
      }
      .site-footer {
        border-top: 1px solid var(--line);
        background: rgba(248, 252, 248, 0.6);
        color: #56695f;
      }
      .site-footer .container {
        padding: 18px 0 20px;
        text-align: center;
        font-size: clamp(1.1rem, 1.6vw, 1.6rem);
      }
      @keyframes up {
        from { opacity: 0; transform: translateY(11px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes swayA {
        from { transform: translate3d(0, 0, 0); }
        to { transform: translate3d(18px, 20px, 0); }
      }
      @keyframes swayB {
        from { transform: translate3d(0, 0, 0); }
        to { transform: translate3d(-24px, -18px, 0); }
      }
      @media (max-width: 980px) {
        .header-row { padding: 14px 0 12px; }
        .site-nav { width: 100%; column-gap: 4ch; }
        .hero p { margin-top: 40px; }
      }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="glow"></div>
    <div class="glow-2"></div>

    <header class="site-header">
      <div class="container header-row">
        <a href="/"><img class="brand-logo" src="/chakraborti-logo.png" alt="Chakraborti" /></a>
        <nav class="site-nav" aria-label="Main navigation">
          <a href="/family/">About Us</a>
          <a href="/stories/" class="active">Our Stories</a>
          <a href="/memoirs/">Research &amp; Articles</a>
          <a href="/apps/">Apps &amp; Tools</a>
        </nav>
      </div>
    </header>

    <main class="home-main">
      <section class="hero">
        <h1>We are time travelling lump of stardust. Just like you!</h1>
        <p>Welcome to our family's home on cyberspace</p>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">&copy; Chakraborti Family, 2026 | We do not collect any data.</div>
    </footer>
  </body>
</html>
