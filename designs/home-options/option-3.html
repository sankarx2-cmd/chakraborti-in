<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Homepage Option 3 · Polar Blue</title>
    <style>
      :root {
        --bg-1: #f2f6fc;
        --bg-2: #ebf2fb;
        --text: #102037;
        --muted: #4f6380;
        --line: #ced9e8;
        --accent: #c91b1b;
        --nav: #445977;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        min-height: 100vh;
        color: var(--text);
        background: linear-gradient(160deg, var(--bg-1) 0%, var(--bg-2) 100%);
        position: relative;
        overflow-x: hidden;
      }
      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: -2;
      }
      body::before {
        background: radial-gradient(circle at 16% 18%, rgba(47, 110, 197, 0.19) 0%, rgba(47, 110, 197, 0) 38%),
                    radial-gradient(circle at 84% 82%, rgba(201, 27, 27, 0.14) 0%, rgba(201, 27, 27, 0) 34%);
        animation: drift 24s linear infinite;
      }
      body::after {
        background: repeating-linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0 2px, rgba(255, 255, 255, 0) 2px 28px);
        opacity: 0.35;
      }
      .container {
        width: min(1420px, 92vw);
        margin: 0 auto;
      }
      .site-header {
        border-bottom: 1px solid var(--line);
        background: rgba(246, 250, 255, 0.76);
        backdrop-filter: blur(8px);
      }
      .header-row {
        min-height: 86px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }
      .brand-logo { height: 20px; width: auto; }
      .site-nav {
        display: flex;
        flex-wrap: wrap;
        column-gap: 8ch;
        row-gap: 10px;
      }
      .site-nav a {
        color: var(--nav);
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-size: 0.8rem;
        padding: 4px 0;
        position: relative;
      }
      .site-nav a::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: -6px;
        height: 2px;
        background: var(--accent);
        transform: scaleX(0.35);
        transform-origin: left center;
        opacity: 0;
        transition: transform 220ms ease, opacity 140ms ease;
      }
      .site-nav a.active,
      .site-nav a:hover { color: #183255; }
      .site-nav a.active::after,
      .site-nav a:hover::after { transform: scaleX(1); opacity: 1; }
      .home-main {
        min-height: calc(100vh - 165px);
        display: flex;
        align-items: center;
      }
      .hero {
        width: min(1420px, 92vw);
        margin: 0 auto;
        text-align: center;
        padding: 5vh 0 10vh;
      }
      .hero h1 {
        margin: 0;
        font-size: clamp(2rem, 4.45vw, 4rem);
        line-height: 1.18;
        letter-spacing: -0.02em;
        color: var(--text);
        text-wrap: balance;
        animation: raise 720ms ease both;
      }
      .hero p {
        margin: 62px auto 0;
        max-width: 39ch;
        font-size: clamp(1.2rem, 2.25vw, 1.95rem);
        line-height: 1.37;
        color: var(--muted);
        animation: raise 980ms ease both;
      }
      .site-footer {
        border-top: 1px solid var(--line);
        background: rgba(243, 248, 255, 0.65);
        color: #526682;
      }
      .site-footer .container {
        padding: 18px 0 20px;
        text-align: center;
        font-size: clamp(1.1rem, 1.6vw, 1.6rem);
      }
      @keyframes raise {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes drift {
        from { transform: translate3d(0, 0, 0); }
        to { transform: translate3d(2%, -2%, 0); }
      }
      @media (max-width: 980px) {
        .header-row { padding: 14px 0 12px; }
        .site-nav { width: 100%; column-gap: 4ch; }
        .hero p { margin-top: 40px; }
      }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-row">
        <a href="/"><img class="brand-logo" src="/chakraborti-logo.png" alt="Chakraborti" /></a>
        <nav class="site-nav" aria-label="Main navigation">
          <a href="/family/">About Us</a>
          <a href="/stories/" class="active">Our Stories</a>
          <a href="/memoirs/">Research &amp; Articles</a>
          <a href="/apps/">Apps &amp; Tools</a>
        </nav>
      </div>
    </header>

    <main class="home-main">
      <section class="hero">
        <h1>We are time travelling lump of stardust. Just like you!</h1>
        <p>Welcome to our family's home on cyberspace</p>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">&copy; Chakraborti Family, 2026 | We do not collect any data.</div>
    </footer>
  </body>
</html>
