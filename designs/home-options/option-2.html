<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Homepage Option 2 · Sunrise Linen</title>
    <style>
      :root {
        --bg-1: #fdf9f3;
        --bg-2: #f8f2e9;
        --text: #241a15;
        --muted: #6c6058;
        --line: #e5d8ca;
        --accent: #c52828;
        --nav: #6c625c;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        min-height: 100vh;
        color: var(--text);
        background: linear-gradient(152deg, var(--bg-1) 0%, var(--bg-2) 100%);
        position: relative;
        overflow-x: hidden;
      }
      .aura,
      .aura-2 {
        position: fixed;
        z-index: -1;
        border-radius: 999px;
        pointer-events: none;
      }
      .aura {
        width: 460px;
        height: 460px;
        right: -180px;
        top: -190px;
        background: radial-gradient(circle, rgba(213, 93, 58, 0.18) 0%, rgba(213, 93, 58, 0) 72%);
        animation: bloomA 18s ease-in-out infinite alternate;
      }
      .aura-2 {
        width: 490px;
        height: 490px;
        left: -180px;
        bottom: -210px;
        background: radial-gradient(circle, rgba(176, 117, 72, 0.18) 0%, rgba(176, 117, 72, 0) 75%);
        animation: bloomB 23s ease-in-out infinite alternate;
      }
      .container {
        width: min(1420px, 92vw);
        margin: 0 auto;
      }
      .site-header {
        border-bottom: 1px solid var(--line);
        background: rgba(255, 250, 244, 0.74);
        backdrop-filter: blur(6px);
      }
      .header-row {
        min-height: 86px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }
      .brand-logo { height: 20px; width: auto; }
      .site-nav {
        display: flex;
        flex-wrap: wrap;
        column-gap: 8ch;
        row-gap: 10px;
      }
      .site-nav a {
        color: var(--nav);
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-size: 0.8rem;
        padding: 4px 0;
        position: relative;
      }
      .site-nav a::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: -6px;
        height: 2px;
        background: var(--accent);
        transform: scaleX(0.35);
        transform-origin: left center;
        opacity: 0;
        transition: transform 220ms ease, opacity 140ms ease;
      }
      .site-nav a.active,
      .site-nav a:hover { color: #31231c; }
      .site-nav a.active::after,
      .site-nav a:hover::after { transform: scaleX(1); opacity: 1; }
      .home-main {
        min-height: calc(100vh - 165px);
        display: flex;
        align-items: center;
      }
      .hero {
        width: min(1420px, 92vw);
        margin: 0 auto;
        text-align: center;
        padding: 5vh 0 10vh;
      }
      .hero h1 {
        margin: 0;
        font-size: clamp(2rem, 4.4vw, 4rem);
        line-height: 1.19;
        letter-spacing: -0.02em;
        color: var(--text);
        animation: fadeUp 700ms ease both;
      }
      .hero p {
        margin: 60px auto 0;
        max-width: 39ch;
        font-size: clamp(1.2rem, 2.25vw, 1.95rem);
        line-height: 1.37;
        color: var(--muted);
        animation: fadeUp 930ms ease both;
      }
      .site-footer {
        border-top: 1px solid var(--line);
        background: rgba(255, 249, 240, 0.66);
        color: #6f645f;
      }
      .site-footer .container {
        padding: 18px 0 20px;
        text-align: center;
        font-size: clamp(1.1rem, 1.6vw, 1.6rem);
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes bloomA {
        from { transform: translate3d(0, 0, 0); }
        to { transform: translate3d(-18px, 18px, 0); }
      }
      @keyframes bloomB {
        from { transform: translate3d(0, 0, 0); }
        to { transform: translate3d(20px, -12px, 0); }
      }
      @media (max-width: 980px) {
        .header-row { padding: 14px 0 12px; }
        .site-nav { width: 100%; column-gap: 4ch; }
        .hero p { margin-top: 40px; }
      }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="aura"></div>
    <div class="aura-2"></div>

    <header class="site-header">
      <div class="container header-row">
        <a href="/"><img class="brand-logo" src="/chakraborti-logo.png" alt="Chakraborti" /></a>
        <nav class="site-nav" aria-label="Main navigation">
          <a href="/family/">About Us</a>
          <a href="/stories/" class="active">Our Stories</a>
          <a href="/memoirs/">Research &amp; Articles</a>
          <a href="/apps/">Apps &amp; Tools</a>
        </nav>
      </div>
    </header>

    <main class="home-main">
      <section class="hero">
        <h1>We are time travelling lump of stardust. Just like you!</h1>
        <p>Welcome to our family's home on cyberspace</p>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">&copy; Chakraborti Family, 2026 | We do not collect any data.</div>
    </footer>
  </body>
</html>
